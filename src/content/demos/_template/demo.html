<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Title</title>
    <style>
      /*
       * Demos are authored to work in two contexts:
       *  1. As a standalone HTML page (served at /demos/{slug}/demo.html)
       *  2. Mounted inside a shadow root on the wrapped /demos/{slug}/ page
       *
       * The `body, :host` selector list matches whichever root element
       * exists in the current context. :host only matches inside a shadow
       * root; body only matches in a regular document.
       */
      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body,
      :host {
        display: grid;
        place-items: center;
        margin: 0;
        min-height: 100%;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
      }

      canvas {
        border: 1px solid #333;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <!--
      The `layoutsubtree` attribute tells the browser to lay out
      the canvas's child elements so they can be painted onto it.
    -->
    <canvas id="canvas" width="800" height="600" layoutsubtree>
      <div id="content" style="padding: 2rem; font-size: 1.5rem">
        Hello from HTML-in-Canvas!
      </div>
    </canvas>

    <script>
      // Resolve the script's root: a ShadowRoot when mounted via shadow
      // DOM, or `document` when this file is served standalone.
      const root = window.__demoRoot ?? document;

      const canvas = root.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const content = root.getElementById("content");

      // ---------------------------------------------------------------
      // Paint callback
      // Fires whenever the browser needs to re-render canvas children.
      // Use ctx.drawElementImage() to composite laid-out DOM into the
      // canvas. The returned DOMMatrix can be applied as a CSS
      // transform on the source element to keep DOM hit-testing in
      // sync with the painted position.
      // ---------------------------------------------------------------
      canvas.onpaint = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const transform = ctx.drawElementImage(content, 0, 0);
        if (transform) content.style.transform = transform.toString();
      };

      // ---------------------------------------------------------------
      // ResizeObserver
      // Keeps the canvas resolution in sync with its CSS layout size.
      // IMPORTANT: we size the bitmap 1:1 with CSS pixels (NOT CSS ×
      // devicePixelRatio). Chrome's <canvas layoutsubtree> uses
      // canvas.width as the layout viewport for child elements, so
      // a DPR-scaled bitmap doubles the layout width and breaks
      // percentage-based sizing, text wrapping, and flex layout on
      // Retina displays. Trade-off: slightly softer rendering on
      // Retina. Use requestPaint() so the browser's paint pipeline
      // runs and generates cached paint records.
      // ---------------------------------------------------------------
      const ro = new ResizeObserver(([entry]) => {
        const { width, height } = entry.contentRect;
        canvas.width = Math.round(width);
        canvas.height = Math.round(height);
        canvas.requestPaint?.();
      });
      ro.observe(canvas);
    </script>
  </body>
</html>

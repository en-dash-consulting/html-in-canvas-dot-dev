#
# Build and deploy the Astro site to GitHub Pages on every push to main,
# and on-demand via the workflow_dispatch button in the Actions tab.
#
# Repository settings must have Settings → Pages → Source set to
# "GitHub Actions" for this workflow to be allowed to publish.
#
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to publish to Pages and request an OIDC token for
# the deployment verification step.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys: cancel an in-flight run if a newer push lands, but
# let any currently-deploying run finish so the live site is never in a
# half-published state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
